apiVersion: audit.k8s.io/v1
kind: Policy
rules:
- level: RequestResponse
  resources:
  - group: ""
    resources: ["pods", "services", "endpoints","serviceaccounts"]
  verbs: ["create", "update", "patch", "delete"]
  stages: ["ResponseComplete"]
- level: RequestResponse
  resources:
  - group: ""
    resources: ["secrets"]
  verbs: ["get", "list", "watch"]
  stages: ["ResponseComplete"]
