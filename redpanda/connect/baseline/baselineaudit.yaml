input:
  kafka:
    addresses: [ "${REDPANDA_HOSTS}" ]
    topics:
      - keygenaudit
    consumer_group: "redpanda-connect-baselineaudit"
  
pipeline:
  processors:
    - redis:
        url: "redis://${REDIS_HOST}"
        command: SADD
        args_mapping: 'root = [ "baselineaudit", @kafka_key ]'

output:
  drop: {}
